<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Auto Refresh — Options</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f9fafb;
        color: #111827;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 2rem;
      }

      .card {
        background: #ffffff;
        border: 1px solid #e5e7eb;
        border-radius: 12px;
        padding: 2rem;
        width: 100%;
        max-width: 400px;
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.07);
      }

      h1 {
        font-size: 1.25rem;
        font-weight: 700;
        margin-bottom: 0.25rem;
        color: #111827;
      }

      p.subtitle {
        font-size: 0.875rem;
        color: #6b7280;
        margin-bottom: 1.5rem;
      }

      label {
        display: block;
        font-size: 0.875rem;
        font-weight: 600;
        color: #374151;
        margin-bottom: 0.5rem;
      }

      .input-row {
        display: flex;
        gap: 0.5rem;
        align-items: center;
      }

      input[type="number"] {
        flex: 1;
        padding: 0.6rem 0.75rem;
        border: 1px solid #d1d5db;
        border-radius: 8px;
        font-size: 1rem;
        color: #111827;
        outline: none;
        transition: border-color 0.15s;
      }

      input[type="number"]:focus {
        border-color: #6366f1;
        box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
      }

      .unit {
        font-size: 0.875rem;
        color: #6b7280;
        white-space: nowrap;
      }

      button {
        margin-top: 1.25rem;
        width: 100%;
        padding: 0.65rem 1rem;
        background: #6366f1;
        color: #fff;
        border: none;
        border-radius: 8px;
        font-size: 0.95rem;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.15s;
      }

      button:hover {
        background: #4f46e5;
      }
      button:active {
        background: #4338ca;
      }

      #status {
        margin-top: 1rem;
        font-size: 0.85rem;
        text-align: center;
        min-height: 1.25rem;
        color: #16a34a;
        font-weight: 500;
        opacity: 0;
        transition: opacity 0.3s;
      }

      #status.visible {
        opacity: 1;
      }

      .hint {
        margin-top: 1rem;
        font-size: 0.78rem;
        color: #9ca3af;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>⚡ Auto Refresh Settings</h1>
      <p class="subtitle">Configure how often the active tab is refreshed.</p>

      <label for="intervalInput">Refresh Interval</label>
      <div class="input-row">
        <input
          type="number"
          id="intervalInput"
          min="0.1"
          step="0.1"
          placeholder="e.g. 5"
        />
        <span class="unit">seconds</span>
      </div>

      <button id="saveBtn">Save Settings</button>
      <div id="status">✓ Settings saved!</div>

      <p class="hint">
        Minimum recommended: <strong>1 second</strong>. Very low values (under
        0.5s) may cause high CPU usage. Changes apply the next time you activate
        auto-refresh on a tab.
      </p>
    </div>

    <script src="options.js"></script>
  </body>
</html>
